name: Bug Report
description: Report something that is broken
labels: ["bug"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Describe the problem clearly. Include error messages if any.
    validations:
      required: true

  - type: textarea
    id: steps-to-reproduce
    attributes:
      label: Steps to reproduce
      description: List the smallest set of steps that triggers the bug.
      placeholder: |
        1. Open ...
        2. Run ...
        3. See ...
    validations:
      required: true

  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected behavior
      description: What did you expect to happen instead?
    validations:
      required: true

  - type: textarea
    id: version-environment
    attributes:
      label: Version/environment
      description: Include relevant versions, OS, terminal, Neovim version, plugin version, or config details.
      placeholder: |
        OS:
        Neovim:
        Terminal:
        Relevant plugin/config:
    validations:
      required: true
